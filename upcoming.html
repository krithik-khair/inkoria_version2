<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>INKORIA — Forthcoming Titles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #FCFAF5;
      color: #2C2A29;
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    input, textarea, button {
      user-select: text;
      -webkit-user-select: text;
    }
    .error-message {
      font-size: 11px;
      color: #C45A3B;
      margin-top: 6px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(196,90,59,0.05);
      padding: 6px 12px;
      border-radius: 30px;
    }
    .error-message::before {
      content: "✧";
      font-size: 12px;
      opacity: 0.8;
    }
    .input-error {
      border-color: #C45A3B !important;
      background-color: #FFF8F6 !important;
    }
    .sri-yantra-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0.1;
    }
    .sri-yantra-svg {
      width: 90vw;
      max-width: 1000px;
      height: auto;
      animation: rotateYantra 120s linear infinite, breatheYantra 8s ease-in-out infinite;
    }
    @keyframes rotateYantra {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes breatheYantra {
      0%,100% { transform: scale(1); opacity: 0.1; }
      50% { transform: scale(1.02); opacity: 0.12; }
    }
    @media (max-width:768px){
      .sri-yantra-bg { opacity: 0.05; }
      .sri-yantra-svg { animation: none; transform: rotate(0deg); }
    }
    .content {
      position: relative;
      z-index: 10;
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 32px 80px;
      background: rgba(252,250,245,0.85);
      backdrop-filter: blur(2px);
    }
    h1, h2, h3, .serif {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 0;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 1px solid #E8E0D3;
      margin-bottom: 40px;
    }
    .logo {
      font-size: 32px;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      color: #2C2A29;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo span { color: #C6A15B; }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: #6B5E4A;
      transition: color 0.2s;
      cursor: pointer;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: #C6A15B;
      transition: width 0.25s ease;
    }
    .nav-links a:hover::after,
    .nav-links a.active::after { width: 100%; }
    .nav-links a:hover { color: #C6A15B; }
    .nav-btn {
      background: #2C2A29;
      color: #FCFAF5;
      padding: 8px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      display: inline-block;
    }
    .nav-btn:hover {
      background: #C6A15B;
      transform: translateY(-1px);
    }
    .section-header {
      text-align: center;
      margin: 60px 0 40px;
    }
    .section-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #C6A15B;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 40px;
      font-family: 'Cormorant Garamond', serif;
      margin-top: 8px;
    }
    .section-title em { color: #C6A15B; font-style: italic; }
    .upcoming-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 32px;
      margin-bottom: 48px;
    }
    .upcoming-card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid #E8E0D3;
      transition: all 0.25s;
      cursor: pointer;
    }
    .upcoming-card:hover {
      transform: translateY(-6px);
      border-color: #C6A15B;
    }
    .upcoming-card:active {
      transform: translateY(-2px);
      transition-duration: 0.1s;
    }
    .upcoming-title {
      font-size: 24px;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      margin-bottom: 24px;
    }
    .waitlist-btn {
      background: transparent;
      border: 1px solid #E8E0D3;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .waitlist-btn:hover {
      border-color: #C6A15B;
      color: #C6A15B;
    }
    footer {
      border-top: 1px solid #E8E0D3;
      padding: 56px 0 32px;
      margin-top: 40px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 48px;
    }
    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #2C2A29;
    }
    .footer-brand-line {
      margin-top: 16px;
      font-size: 11px;
      color: #9B8E78;
      letter-spacing: 0.04em;
    }
    .footer-col h4 {
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      color: #9B8E78;
    }
    .footer-col a {
      display: block;
      color: #6B5E4A;
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .footer-col a:hover {
      color: #C6A15B;
    }
    .footer-bottom {
      text-align: center;
      font-size: 11px;
      color: #9B8E78;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #E8E0D3;
    }
    .msme {
      margin-top: 12px;
      font-size: 11px;
      color: #9B8E78;
    }
    @media (max-width:768px){
      .content { padding: 16px; }
      nav { flex-direction: column; align-items: center; }
      .nav-links { gap: 24px; flex-wrap: wrap; justify-content: center; }
      .upcoming-grid { gap: 24px; }
      .upcoming-card { padding: 28px 20px; }
      .upcoming-title { font-size: 20px; }
      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .footer-bottom { text-align: center; }
    }
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .custom-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(44,42,41,0.4);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s;
    }
    .custom-modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .custom-modal {
      background: #FCFAF5;
      max-width: 460px;
      width: 90%;
      border-radius: 28px;
      box-shadow: 0 30px 45px -12px rgba(0,0,0,0.25);
      text-align: center;
      padding: 36px 32px;
      transform: translateY(20px);
      transition: transform 0.25s ease;
      border: 1px solid #E8E0D3;
      margin: 16px;
    }
    .custom-modal-overlay.active .custom-modal {
      transform: translateY(0);
    }
    .custom-modal h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      margin-bottom: 12px;
    }
    .custom-modal p {
      color: #6B5E4A;
      margin-bottom: 24px;
    }
    .modal-input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .modal-input-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 40px;
      border: 1px solid #E8E0D3;
      background: white;
      font-family: inherit;
      outline: none;
    }
    .modal-input-group input:focus {
      border-color: #C6A15B;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .modal-btn {
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      background: #2C2A29;
      color: white;
    }
    .modal-btn-secondary {
      background: transparent;
      border: 1px solid #E8E0D3;
      color: #6B5E4A;
    }
    .modal-btn-secondary:hover {
      border-color: #C6A15B;
      color: #C6A15B;
    }
    .modal-btn:hover {
      background: #C6A15B;
    }
  </style>
</head>
<body>
<div class="sri-yantra-bg">
  <svg class="sri-yantra-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="binduGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="0.6"/><stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/></radialGradient></defs>
    <rect x="80" y="80" width="640" height="640" fill="none" stroke="#C6A15B" stroke-width="1.5" opacity="0.6"/>
    <rect x="100" y="100" width="600" height="600" fill="none" stroke="#C6A15B" stroke-width="1" opacity="0.4"/>
    <path d="M80 80 L120 80 L120 60 L160 60 L160 80 L200 80" fill="none" stroke="#C6A15B" stroke-width="1" opacity="0.5"/>
    <path d="M720 80 L680 80 L680 60 L640 60 L640 80 L600 80" fill="none" stroke="#C6A15B" stroke-width="1" opacity="0.5"/>
    <path d="M80 720 L120 720 L120 740 L160 740 L160 720 L200 720" fill="none" stroke="#C6A15B" stroke-width="1" opacity="0.5"/>
    <path d="M720 720 L680 720 L680 740 L640 740 L640 720 L600 720" fill="none" stroke="#C6A15B" stroke-width="1" opacity="0.5"/>
    <g fill="none" stroke="#C6A15B" stroke-width="1.2" opacity="0.5">
      <ellipse cx="400" cy="220" rx="30" ry="70" transform="rotate(0,400,400)"/>
      <ellipse cx="400" cy="220" rx="30" ry="70" transform="rotate(45,400,400)"/>
      <ellipse cx="400" cy="220" rx="30" ry="70" transform="rotate(90,400,400)"/>
      <ellipse cx="400" cy="220" rx="30" ry="70" transform="rotate(135,400,400)"/>
      <ellipse cx="400" cy="220" rx="30" ry="70" transform="rotate(180,400,400)"/>
      <ellipse cx="400" cy="220" rx="30" ry="70" transform="rotate(225,400,400)"/>
      <ellipse cx="400" cy="220" rx="30" ry="70" transform="rotate(270,400,400)"/>
      <ellipse cx="400" cy="220" rx="30" ry="70" transform="rotate(315,400,400)"/>
    </g>
    <circle cx="400" cy="400" r="140" fill="none" stroke="#C6A15B" stroke-width="1" opacity="0.4" stroke-dasharray="4 6"/>
    <polygon points="400,120 260,480 540,480" fill="none" stroke="#D4AF37" stroke-width="1.8" opacity="0.7"/>
    <polygon points="400,160 210,490 590,490" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
    <polygon points="400,200 160,500 640,500" fill="none" stroke="#D4AF37" stroke-width="1.3" opacity="0.5"/>
    <polygon points="400,240 120,510 680,510" fill="none" stroke="#D4AF37" stroke-width="1.1" opacity="0.5"/>
    <polygon points="400,680 280,320 520,320" fill="none" stroke="#D4AF37" stroke-width="1.8" opacity="0.7"/>
    <polygon points="400,640 230,310 570,310" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
    <polygon points="400,600 180,300 620,300" fill="none" stroke="#D4AF37" stroke-width="1.3" opacity="0.5"/>
    <polygon points="400,560 140,290 660,290" fill="none" stroke="#D4AF37" stroke-width="1.1" opacity="0.5"/>
    <polygon points="400,520 110,280 690,280" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
    <circle cx="400" cy="400" r="6" fill="#D4AF37" opacity="0.9"/>
    <circle cx="400" cy="400" r="18" fill="url(#binduGlow)" opacity="0.6"/>
    <circle cx="400" cy="400" r="32" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.4"/>
  </svg>
</div>
<div class="content">
  <nav>
    <a href="/" class="logo">INKORIA<span>.</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/store">Store</a></li>
      <li><a href="/upcoming" class="active">Forthcoming</a></li>
    </ul>
    <a href="/#newsletter" class="nav-btn">Subscribe</a>
  </nav>
  <div class="section-header">
    <div class="section-eyebrow">COMING SOON</div>
    <div class="section-title">Forthcoming <em>Titles</em></div>
  </div>
  <div class="upcoming-grid" id="upcomingGrid"></div>
</div>
<footer>
  <div class="footer-container" style="max-width:1280px; margin:0 auto; padding:0 32px;">
    <div class="footer-grid" id="footerGrid"></div>
    <div class="footer-bottom" id="footerBottom"></div>
  </div>
</footer>
<div id="customModal" class="custom-modal-overlay">
  <div class="custom-modal" id="modalDynamicContent"></div>
</div>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEPeKWvw6mc3TMqS85Mz_m95T0VnDuCyz1GgCzGgVdiEVpRZd7YuWwvuCWOY32z278/exec";

  function isValidEmail(email) {
    const parts = email.split('@');
    if (parts.length !== 2) return false;
    const domain = parts[1];
    return domain.includes('.') && domain.length > 3;
  }

  function showError(input, message) {
    input.classList.add('input-error');
    const errorDiv = document.createElement('div');
    errorDiv.className = 'error-message';
    errorDiv.innerText = message;
    input.parentNode.insertBefore(errorDiv, input.nextSibling);
  }
  function clearErrors(container) {
    container.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
    container.querySelectorAll('.error-message').forEach(el => el.remove());
  }

  // Completely rebuild modal content each time – no leftover fields
  function showModal(options) {
    const modalContainer = document.getElementById('modalDynamicContent');
    // Build fresh HTML
    let fieldsHtml = '';
    if (options.fields) {
      fieldsHtml = options.fields.map(f => `
        <div class="modal-input-group">
          <input type="${f.type}" id="${f.id}" placeholder="${f.placeholder}" required>
        </div>
      `).join('');
    }
    const buttonsHtml = options.buttons.map(btn => `
      <button class="modal-btn ${btn.primary ? '' : 'modal-btn-secondary'}" data-action="${btn.action}">
        ${btn.label}
      </button>
    `).join('');
    modalContainer.innerHTML = `
      <h3>${options.title}</h3>
      <p>${options.message}</p>
      ${fieldsHtml}
      <div class="modal-buttons">${buttonsHtml}</div>
    `;
    const overlay = document.getElementById('customModal');
    overlay.classList.add('active');

    const modalContentDiv = modalContainer;
    document.querySelectorAll('#modalDynamicContent .modal-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.getAttribute('data-action');
        if (action === 'close') {
          overlay.classList.remove('active');
        } else if (action === 'submitWaitlist') {
          const nameInput = document.getElementById('waitlistName');
          const emailInput = document.getElementById('waitlistEmail');
          let isValid = true;
          clearErrors(modalContentDiv);
          if (!nameInput.value.trim()) {
            showError(nameInput, "Please enter your name.");
            isValid = false;
          }
          if (!emailInput.value.trim()) {
            showError(emailInput, "Please enter your email address.");
            isValid = false;
          } else if (!isValidEmail(emailInput.value.trim())) {
            showError(emailInput, "Enter a valid email (e.g., name@gmail.com, name@hotmail.com).");
            isValid = false;
          }
          if (isValid) {
            // Disable button, show spinner
            const originalText = btn.innerText;
            btn.classList.add('btn-loading');
            btn.innerText = '';
            btn.disabled = true;
            submitToGoogleSheets({ type: 'waitlist', book: options.book, name: nameInput.value.trim(), email: emailInput.value.trim() }, () => {
              btn.classList.remove('btn-loading');
              btn.innerText = originalText;
              btn.disabled = false;
              overlay.classList.remove('active');
              // Show success modal
              showModal({
                title: "Added to Release Notifications",
                message: `We'll notify you when "${options.book}" becomes available.`,
                buttons: [{ label: "Understood", action: "close", primary: true }]
              });
            });
          }
        }
      });
    });
  }

  function submitToGoogleSheets(data, onSuccess) {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...data, timestamp: new Date().toISOString() })
    }).then(() => onSuccess()).catch(() => onSuccess());
  }

  async function loadData() {
    const res = await fetch('/data.json');
    return await res.json();
  }

  async function init() {
    const data = await loadData();
    const upcoming = data.upcoming;
    document.getElementById('upcomingGrid').innerHTML = upcoming.map(title => `
      <div class="upcoming-card">
        <div class="upcoming-title">${title}</div>
        <button class="waitlist-btn" data-title="${title}">Join Waiting List</button>
      </div>
    `).join('');
    document.querySelectorAll('.waitlist-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const bookTitle = btn.getAttribute('data-title');
        showModal({
          title: "Join the Waiting List",
          message: `Be notified when "${bookTitle}" becomes available.`,
          fields: [
            { type: "text", id: "waitlistName", placeholder: "Full name" },
            { type: "email", id: "waitlistEmail", placeholder: "Email address" }
          ],
          buttons: [
            { label: "Notify Me", action: "submitWaitlist", primary: true },
            { label: "Cancel", action: "close", primary: false }
          ],
          book: bookTitle
        });
      });
    });
    document.getElementById('footerGrid').innerHTML = `
      <div>
        <div class="footer-logo">INKORIA</div>
        <p style="font-size:13px; color:#6B5E4A; margin-top:8px;">Khair Publications · MSME registered, India</p>
        <div class="footer-brand-line">A part of KHAIR PUBLICATIONS</div>
        <div class="msme">MSME Registered · J&K, INDIA</div>
      </div>
      <div class="footer-col">
        <h4>Library</h4>
        <a href="/#books">Kashmiri Shavism</a>
        <a href="/#books">Concept of Spanda</a>
        <a href="/#books">Abhinavagupta</a>
        <a href="/#books">Vijñāna Bhairava</a>
      </div>
      <div class="footer-col">
        <h4>Connect</h4>
        <a href="/#newsletter">Subscribe</a>
        <a href="/upcoming">Waiting Lists</a>
        <a href="/#philosophy">About Inkoria</a>
        <a href="/contact">Customer Support</a>
      </div>
    `;
    document.getElementById('footerBottom').innerHTML = `<p>© 2026 Krithik Khair · Khair Publications · All rights reserved</p>`;
  }
  init();

  document.addEventListener('contextmenu', (e) => {
    const tag = e.target.tagName.toLowerCase();
    if (tag !== 'input' && tag !== 'textarea' && tag !== 'button') e.preventDefault();
  });
  document.querySelectorAll('img').forEach(img => {
    img.setAttribute('draggable', 'false');
    img.addEventListener('dragstart', e => e.preventDefault());
  });
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal, .upcoming-card').forEach(el => {
    el.classList.add('reveal');
    observer.observe(el);
  });
</script>
</body>
</html>
