<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>INKORIA — Himalayan Wisdom Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://gumroad.com/js/gumroad.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #FCFAF5;
      color: #2C2A29;
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    input, textarea, button {
      user-select: text;
      -webkit-user-select: text;
    }
    /* Smooth transitions */
    .books-grid, .upcoming-grid, .book-card, .upcoming-card, .custom-modal, .sri-yantra-svg {
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
    }
    .btn-loading {
      position: relative;
      pointer-events: none;
      opacity: 0.8;
    }
    .btn-loading::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      top: 50%;
      left: 50%;
      margin-left: -9px;
      margin-top: -9px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,240,0.3);
      border-top-color: #D4AF37;
      border-right-color: #C6A15B;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message {
      font-size: 11px;
      color: #C45A3B;
      margin-top: 6px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(196,90,59,0.05);
      padding: 6px 12px;
      border-radius: 30px;
    }
    .error-message::before { content: "✧"; font-size: 12px; opacity: 0.8; }
    .input-error {
      border-color: #C45A3B !important;
      background-color: #FFF8F6 !important;
    }
    .sri-yantra-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0.1;
    }
    .sri-yantra-svg {
      width: 90vw;
      max-width: 1000px;
      height: auto;
      animation: rotateYantra 120s linear infinite, breatheYantra 8s ease-in-out infinite;
    }
    @keyframes rotateYantra { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes breatheYantra { 0%,100% { transform: scale(1); opacity: 0.1; } 50% { transform: scale(1.02); opacity: 0.12; } }
    @media (max-width:768px){ .sri-yantra-bg { opacity: 0.05; } .sri-yantra-svg { animation: none; transform: rotate(0deg); } }
    .content {
      position: relative;
      z-index: 10;
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 32px 80px;
      background: rgba(252,250,245,0.85);
      backdrop-filter: blur(2px);
    }
    h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; font-weight: 500; letter-spacing: -0.01em; }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 0;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 1px solid #E8E0D3;
      margin-bottom: 40px;
    }
    .logo { font-size: 32px; font-weight: 600; font-family: 'Cormorant Garamond', serif; color: #2C2A29; text-decoration: none; letter-spacing: -0.5px; }
    .logo span { color: #C6A15B; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { text-decoration: none; font-size: 14px; font-weight: 500; color: #6B5E4A; transition: color 0.2s; cursor: pointer; position: relative; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1.5px; background: #C6A15B; transition: width 0.25s ease; }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a:hover { color: #C6A15B; }
    .nav-btn { background: #2C2A29; color: #FCFAF5; padding: 8px 24px; border-radius: 40px; text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; cursor: pointer; display: inline-block; }
    .nav-btn:hover { background: #C6A15B; transform: translateY(-1px); }
    .hero { text-align: center; padding: 60px 0 50px; }
    .hero-badge { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #C6A15B; margin-bottom: 20px; }
    .hero h1 { font-size: clamp(42px, 8vw, 84px); font-weight: 500; line-height: 1.1; margin-bottom: 20px; }
    .hero h1 em { font-style: italic; color: #C6A15B; }
    .hero-sub { font-size: 18px; color: #6B5E4A; max-width: 620px; margin: 0 auto 32px; font-family: 'Cormorant Garamond', serif; font-style: italic; }
    .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary, .btn-outline { padding: 12px 32px; border-radius: 40px; font-size: 14px; font-weight: 500; text-decoration: none; transition: all 0.2s; cursor: pointer; display: inline-block; }
    .btn-primary { background: #2C2A29; color: #FCFAF5; }
    .btn-primary:hover { background: #C6A15B; transform: translateY(-2px); }
    .btn-outline { border: 1px solid #E8E0D3; color: #2C2A29; }
    .btn-outline:hover { border-color: #C6A15B; background: rgba(198,161,91,0.05); }
    .stats { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; margin: 60px 0 40px; padding-top: 40px; border-top: 1px solid #E8E0D3; }
    .stat-item { text-align: center; }
    .stat-number { font-size: 28px; font-weight: 600; font-family: 'Cormorant Garamond', serif; color: #C6A15B; margin-bottom: 4px; }
    .stat-label { font-size: 13px; letter-spacing: 0.02em; color: #6B5E4A; }
    section { margin: 80px 0; }
    .section-header { text-align: center; margin-bottom: 48px; }
    .section-eyebrow { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #C6A15B; margin-bottom: 12px; }
    .section-title { font-size: 40px; font-family: 'Cormorant Garamond', serif; margin-top: 8px; }
    .section-title em { color: #C6A15B; font-style: italic; }
    .section-sub { font-size: 16px; color: #6B5E4A; max-width: 560px; margin: 12px auto 0; }
    .see-more-wrapper { text-align: center; margin-top: 32px; position: relative; z-index: 2; }
    .btn-see-more { background: transparent; border: 1px solid #C6A15B; padding: 12px 32px; border-radius: 40px; font-size: 14px; font-weight: 500; color: #C6A15B; text-decoration: none; transition: all 0.2s; display: inline-block; }
    .btn-see-more:hover { background: #C6A15B; color: #FCFAF5; transform: translateY(-2px); }
    .grid-wrapper { position: relative; }
    .grid-fade-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 120px; background: linear-gradient(to bottom, rgba(252,250,245,0), #FCFAF5); pointer-events: none; z-index: 1; }
    .books-grid, .upcoming-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; }
    .upcoming-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    .book-card, .upcoming-card {
      background: white;
      border-radius: 24px;
      padding: 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
      border: 1px solid #E8E0D3;
      transition: all 0.3s cubic-bezier(0.2,0,0,1);
      overflow: hidden;
      cursor: pointer;
    }
    .book-card:hover, .upcoming-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.1); border-color: #C6A15B; }
    .book-card:active, .upcoming-card:active { transform: translateY(-2px); transition-duration: 0.1s; }
    .book-cover { height: 240px; background: linear-gradient(145deg, #F5F0E8, #EBE3D8); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #E8E0D3; overflow: hidden; }
    .book-cover-inner { width: 80%; height: 80%; background: #2C2A29; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 14px; color: #C6A15B; text-transform: uppercase; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px 12px 0 0; }
    .book-info { padding: 28px 28px 24px; }
    .book-series { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #C6A15B; margin-bottom: 12px; }
    .book-title { font-size: 22px; font-family: 'Cormorant Garamond', serif; font-weight: 600; margin-bottom: 6px; }
    .book-author { font-size: 12px; color: #9B8E78; margin-bottom: 16px; text-transform: uppercase; }
    .book-desc { font-size: 14px; color: #6B5E4A; line-height: 1.5; margin-bottom: 20px; }
    .book-formats { font-size: 12px; color: #C6A15B; margin-bottom: 12px; }
    .book-price-row { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid #E8E0D3; padding-top: 20px; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
    .price { font-size: 22px; font-weight: 600; color: #C6A15B; }
    .download-note { font-size: 11px; color: #9B8E78; text-align: right; }
    .book-actions { display: flex; gap: 16px; }
    .btn-sample, .btn-buy { flex: 1; text-align: center; padding: 10px 0; border-radius: 40px; font-size: 13px; font-weight: 500; transition: all 0.2s; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-sample { background: transparent; border: 1px solid #E8E0D3; color: #6B5E4A; }
    .btn-sample:hover { border-color: #C6A15B; color: #C6A15B; background: rgba(198,161,91,0.05); }
    .btn-buy { background: #2C2A29; color: #FCFAF5; border: none; }
    .btn-buy:hover { background: #C6A15B; transform: translateY(-1px); }
    .upcoming-card { padding: 28px 24px; text-align: center; }
    .upcoming-title { font-size: 20px; font-weight: 600; font-family: 'Cormorant Garamond', serif; margin-bottom: 20px; }
    .waitlist-btn { background: transparent; border: 1px solid #E8E0D3; padding: 8px 20px; border-radius: 40px; font-size: 13px; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif; }
    .waitlist-btn:hover { border-color: #C6A15B; color: #C6A15B; }
    .philosophy { display: flex; flex-wrap: wrap; gap: 48px; background: white; border-radius: 32px; padding: 48px; border: 1px solid #E8E0D3; margin: 80px 0; }
    .philosophy-text { flex: 2; }
    .philosophy-text h3 { font-size: 32px; margin-bottom: 20px; }
    .philosophy-text p { color: #6B5E4A; line-height: 1.7; margin-bottom: 16px; }
    .philosophy-stats { flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .stat-block { background: #FCFAF5; padding: 24px; border-radius: 20px; text-align: center; border: 1px solid #E8E0D3; }
    @media (max-width:768px){
      .philosophy { flex-direction: column; padding: 32px 24px; gap: 32px; }
      .philosophy-text h3 { font-size: 28px; }
      .philosophy-text p { font-size: 15px; }
      .philosophy-stats { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 16px; }
      .stat-block { flex: 1; min-width: calc(50% - 16px); padding: 20px; }
      .stat-block .stat-number { font-size: 28px; }
    }
    @media (max-width:480px){ .stat-block { min-width: 100%; } }
    .newsletter { background: white; border-radius: 32px; padding: 56px 32px; text-align: center; border: 1px solid #E8E0D3; margin: 40px 0; }
    .newsletter h3 { font-size: 28px; margin-bottom: 12px; }
    .newsletter-form { display: flex; flex-direction: column; gap: 16px; max-width: 400px; margin: 32px auto 0; }
    .newsletter-form input { padding: 14px 20px; border-radius: 60px; border: 1px solid #E8E0D3; background: #FCFAF5; font-family: inherit; outline: none; width: 100%; }
    .newsletter-form input:focus { border-color: #C6A15B; }
    .newsletter-form button { background: #2C2A29; color: white; border: none; padding: 14px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; }
    .newsletter-form button:hover { background: #C6A15B; }
    footer { border-top: 1px solid #E8E0D3; padding: 56px 0 32px; margin-top: 40px; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 48px; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; margin-bottom: 12px; color: #2C2A29; }
    .footer-brand-line { margin-top: 16px; font-size: 11px; color: #9B8E78; letter-spacing: 0.04em; }
    .footer-col h4 { font-size: 12px; letter-spacing: 0.1em; margin-bottom: 20px; color: #9B8E78; }
    .footer-col a { display: block; color: #6B5E4A; text-decoration: none; font-size: 13px; margin-bottom: 10px; cursor: pointer; }
    .footer-col a:hover { color: #C6A15B; }
    .footer-bottom { text-align: center; font-size: 11px; color: #9B8E78; margin-top: 48px; padding-top: 24px; border-top: 1px solid #E8E0D3; }
    .msme { margin-top: 12px; font-size: 11px; color: #9B8E78; }
    .custom-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(44,42,41,0.4);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s;
    }
    .custom-modal-overlay.active { opacity: 1; visibility: visible; }
    .custom-modal {
      background: #FCFAF5;
      max-width: 460px;
      width: 90%;
      border-radius: 28px;
      box-shadow: 0 30px 45px -12px rgba(0,0,0,0.25);
      text-align: center;
      padding: 36px 32px;
      transform: translateY(20px);
      transition: transform 0.25s ease;
      border: 1px solid #E8E0D3;
      margin: 16px;
    }
    .custom-modal-overlay.active .custom-modal { transform: translateY(0); }
    .custom-modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 26px; margin-bottom: 12px; }
    .custom-modal p { color: #6B5E4A; margin-bottom: 24px; }
    .modal-input-group { margin-bottom: 20px; text-align: left; }
    .modal-input-group input { width: 100%; padding: 12px 16px; border-radius: 40px; border: 1px solid #E8E0D3; background: white; font-family: inherit; outline: none; }
    .modal-input-group input:focus { border-color: #C6A15B; }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
    .modal-btn { padding: 10px 28px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; border: none; background: #2C2A29; color: white; }
    .modal-btn-secondary { background: transparent; border: 1px solid #E8E0D3; color: #6B5E4A; }
    .modal-btn-secondary:hover { border-color: #C6A15B; color: #C6A15B; }
    .modal-btn:hover { background: #C6A15B; }
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    @media (max-width:768px){
      .content { padding: 16px; }
      nav { flex-direction: column; align-items: center; gap: 16px; }
      .nav-links { gap: 24px; flex-wrap: wrap; justify-content: center; }
      .hero { padding: 40px 0 30px; }
      .hero h1 { font-size: 38px; }
      .stats { gap: 24px; margin: 40px 0 30px; padding-top: 30px; }
      .stat-number { font-size: 24px; }
      .section-title { font-size: 32px; }
      .books-grid { gap: 24px; }
      .book-cover { height: 200px; }
      .book-info { padding: 20px; }
      .book-title { font-size: 20px; }
      .price { font-size: 18px; }
      .book-actions { flex-direction: column; gap: 10px; }
      .btn-sample, .btn-buy { width: 100%; }
      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .custom-modal { padding: 28px 20px; }
      .custom-modal h3 { font-size: 22px; }
      .newsletter { padding: 40px 20px; }
      .upcoming-grid { gap: 20px; }
      .upcoming-card { padding: 20px; }
    }
    @media (max-width:480px){
      .hero-badge { font-size: 9px; letter-spacing: 0.2em; }
      .hero h1 { font-size: 32px; }
      .btn-primary, .btn-outline { padding: 10px 24px; font-size: 13px; }
      .stat-number { font-size: 20px; }
      .section-title { font-size: 28px; }
      .book-series { font-size: 9px; }
      .book-title { font-size: 18px; }
    }
  </style>
</head>

<div class="content">
  <nav>
    <a href="/" class="logo">INKORIA<span>.</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/store">Store</a></li>
      <li><a href="/upcoming">Forthcoming</a></li>
    </ul>
    <a href="/#newsletter" class="nav-btn">Subscribe</a>
  </nav>
  <div class="hero">
    <div class="hero-badge" id="heroBadge"></div>
    <h1 id="heroHeading"></h1>
    <p class="hero-sub" id="heroSub"></p>
    <div class="hero-buttons">
      <a class="btn-primary nav-link-btn" data-target="books" id="exploreBtn">Explore books</a>
      <a class="btn-outline nav-link-btn" data-target="upcoming" id="comingBtn">Coming soon</a>
    </div>
  </div>
  <div class="stats" id="statsContainer"></div>
  <section id="books">
    <div class="section-header">
      <div class="section-eyebrow" id="booksEyebrow"></div>
      <div class="section-title" id="booksTitle"></div>
      <div class="section-sub" id="booksSub"></div>
    </div>
    <div class="grid-wrapper">
      <div class="books-grid" id="booksGrid"></div>
      <div class="grid-fade-bottom"></div>
    </div>
    <div class="see-more-wrapper">
      <a href="/store" class="btn-see-more">See more →</a>
    </div>
  </section>
  <section id="upcoming">
    <div class="section-header">
      <div class="section-eyebrow" id="upcomingEyebrow"></div>
      <div class="section-title" id="upcomingTitle"></div>
      <div class="section-sub" id="upcomingSub"></div>
    </div>
    <div class="grid-wrapper">
      <div class="upcoming-grid" id="upcomingGrid"></div>
      <div class="grid-fade-bottom"></div>
    </div>
    <div class="see-more-wrapper">
      <a href="/upcoming" class="btn-see-more">See more →</a>
    </div>
  </section>
  <div id="philosophy" class="philosophy reveal"></div>
  <div id="newsletter" class="newsletter reveal"></div>
</div>
<footer>
  <div class="footer-container" style="max-width:1280px; margin:0 auto; padding:0 32px;">
    <div class="footer-grid" id="footerGrid"></div>
    <div class="footer-bottom" id="footerBottom"></div>
  </div>
</footer>
<div id="customModal" class="custom-modal-overlay">
  <div class="custom-modal" id="modalContent"></div>
</div>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEPeKWvw6mc3TMqS85Mz_m95T0VnDuCyz1GgCzGgVdiEVpRZd7YuWwvuCWOY32z278/exec";
  function isValidEmail(email) {
    const parts = email.split('@');
    if (parts.length !== 2) return false;
    const domain = parts[1];
    return domain.includes('.') && domain.length > 3;
  }
  function showError(input, message) {
    input.classList.add('input-error');
    const errorDiv = document.createElement('div');
    errorDiv.className = 'error-message';
    errorDiv.innerText = message;
    input.parentNode.insertBefore(errorDiv, input.nextSibling);
  }
  function clearErrors(container) {
    container.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
    container.querySelectorAll('.error-message').forEach(el => el.remove());
  }
  function showModal(options) {
    const overlay = document.getElementById('customModal');
    const container = document.getElementById('modalContent');
    container.innerHTML = `
      <h3>${options.title}</h3>
      <p>${options.message}</p>
      ${options.fields ? options.fields.map(f => `<div class="modal-input-group"><input type="${f.type}" id="${f.id}" placeholder="${f.placeholder}" required></div>`).join('') : ''}
      <div class="modal-buttons">
        ${options.buttons.map(btn => `<button class="modal-btn ${btn.primary ? '' : 'modal-btn-secondary'}" data-action="${btn.action}">${btn.label}</button>`).join('')}
      </div>
    `;
    overlay.classList.add('active');
    const modalContentDiv = container;
    document.querySelectorAll('#modalContent .modal-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.getAttribute('data-action');
        if (action === 'close') {
          overlay.classList.remove('active');
        } else if (action === 'submitWaitlist') {
          const nameInput = document.getElementById('waitlistName');
          const emailInput = document.getElementById('waitlistEmail');
          let isValid = true;
          clearErrors(modalContentDiv);
          if (!nameInput.value.trim()) {
            showError(nameInput, "Please enter your name.");
            isValid = false;
          }
          if (!emailInput.value.trim()) {
            showError(emailInput, "Please enter your email address.");
            isValid = false;
          } else if (!isValidEmail(emailInput.value.trim())) {
            showError(emailInput, "Enter a valid email (e.g., name@gmail.com, name@hotmail.com).");
            isValid = false;
          }
          if (isValid) {
            const originalText = btn.innerText;
            btn.classList.add('btn-loading');
            btn.innerText = '';
            btn.disabled = true;
            submitToGoogleSheets({ type: 'waitlist', book: options.book, name: nameInput.value.trim(), email: emailInput.value.trim() }, () => {
              btn.classList.remove('btn-loading');
              btn.innerText = originalText;
              btn.disabled = false;
              overlay.classList.remove('active');
              showModal({ title: "Added to Release Notifications", message: `We'll notify you when "${options.book}" becomes available.`, buttons: [{ label: "Understood", action: "close", primary: true }] });
            });
          }
        }
      });
    });
  }
  function submitToGoogleSheets(data, onSuccess) {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...data, timestamp: new Date().toISOString() })
    }).then(() => onSuccess()).catch(() => onSuccess());
  }
  async function loadData() {
    const res = await fetch('/data.json');
    return await res.json();
  }
  let allBooks = [];
  function renderBooks() {
    const grid = document.getElementById('booksGrid');
    const featuredBooks = allBooks.slice(0, 2);
    const booksHtml = featuredBooks.map(b => `
      <div class="book-card">
        <div class="book-cover">
          ${b.coverImage ? `<img src="${b.coverImage}" alt="${b.title}">` : `<div class="book-cover-inner">INKORIA</div>`}
        </div>
        <div class="book-info">
          <div class="book-series">${b.series}</div>
          <div class="book-title">${b.title}</div>
          <div class="book-author">${b.author}</div>
          <div class="book-desc">${b.desc}</div>
          <div class="book-formats">${b.formats}</div>
          <div class="book-price-row">
            <span class="price">${b.price}</span>
            <span class="download-note">Instant Download • Secure Checkout</span>
          </div>
          <div class="book-actions">
            <a href="${b.sampleLink}" class="btn-sample" target="_blank">Read Sample</a>
            <a href="${b.gumroadLink}" class="btn-buy" data-gumroad-overlay="true">Buy Now →</a>
          </div>
        </div>
      </div>
    `).join('');
    grid.innerHTML = booksHtml;
    if (window.Gumroad) window.Gumroad.init();
  }
  async function init() {
    const data = await loadData();
    allBooks = data.books;
    document.getElementById('heroBadge').innerText = data.hero.badge;
    document.getElementById('heroHeading').innerHTML = data.hero.heading;
    document.getElementById('heroSub').innerText = data.hero.subheading;
    document.getElementById('exploreBtn').innerText = data.hero.buttons.explore;
    document.getElementById('comingBtn').innerText = data.hero.buttons.coming;
    const updatedStats = [
      { number: "9+", label: "Countries Reached" },
      { number: "4+", label: "Titles Published" },
      { number: "100+", label: "Orders Worldwide" },
      { number: "2025", label: "Founded" }
    ];
    document.getElementById('statsContainer').innerHTML = updatedStats.map(s => `<div class="stat-item"><div class="stat-number">${s.number}</div><div class="stat-label">${s.label}</div></div>`).join('');
    document.getElementById('booksEyebrow').innerText = data.booksSection.eyebrow;
    document.getElementById('booksTitle').innerHTML = data.booksSection.title;
    document.getElementById('booksSub').innerText = data.booksSection.subtitle;
    renderBooks();
    document.getElementById('upcomingEyebrow').innerText = data.upcomingSection.eyebrow;
    document.getElementById('upcomingTitle').innerHTML = data.upcomingSection.title;
    document.getElementById('upcomingSub').innerText = data.upcomingSection.subtitle;
    const featuredUpcoming = data.upcoming.slice(0, 2);
    document.getElementById('upcomingGrid').innerHTML = featuredUpcoming.map(title => `
      <div class="upcoming-card">
        <div class="upcoming-title">${title}</div>
        <button class="waitlist-btn" data-title="${title}">Join Waiting List</button>
      </div>
    `).join('');
    attachWaitlistButtons();
    document.getElementById('philosophy').innerHTML = `
      <div class="philosophy-text">
        <h3>${data.philosophy.title}</h3>
        ${data.philosophy.paragraphs.map(p => `<p>${p}</p>`).join('')}
      </div>
      <div class="philosophy-stats">
        ${data.philosophy.stats.map(s => `<div class="stat-block"><div class="stat-number">${s.number}</div><div>${s.label}</div></div>`).join('')}
      </div>
    `;
    document.getElementById('newsletter').innerHTML = `
      <h3>${data.newsletter.title}</h3>
      <p style="color: #6B5E4A; max-width: 500px; margin: 0 auto;">${data.newsletter.subtitle}</p>
      <form id="newsletterForm" class="newsletter-form">
        <input type="text" name="name" placeholder="Full name" required>
        <input type="email" name="email" placeholder="Email address" required>
        <button type="submit">${data.newsletter.buttonText}</button>
      </form>
    `;
    attachNewsletterHandler();
    document.getElementById('footerGrid').innerHTML = `
      <div>
        <div class="footer-logo">INKORIA</div>
        <p style="font-size:13px; color:#6B5E4A; margin-top:8px;">Khair Publications · MSME registered, India</p>
        <div class="footer-brand-line">A part of KHAIR PUBLICATIONS</div>
        <div class="msme">MSME Registered · J&K, INDIA</div>
      </div>
      <div class="footer-col">
        <h4>Library</h4>
        <a href="/#books">Kashmiri Shavism</a>
        <a href="/#books">Concept of Spanda</a>
        <a href="/#books">Abhinavagupta</a>
        <a href="/#books">Vijñāna Bhairava</a>
      </div>
      <div class="footer-col">
        <h4>Connect</h4>
        <a href="/#newsletter">Subscribe</a>
        <a href="/upcoming">Waiting Lists</a>
        <a href="/#philosophy">About Inkoria</a>
        <a href="/contact">Customer Support</a>
      </div>
    `;
    document.getElementById('footerBottom').innerHTML = `<p>© 2026 Krithik Khair · Khair Publications · All rights reserved</p>`;
    document.querySelectorAll('.nav-link, .nav-link-btn').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const target = link.getAttribute('data-target');
        if (target) document.getElementById(target)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }
  function attachNewsletterHandler() {
    const form = document.getElementById('newsletterForm');
    if (!form) return;
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const nameInput = form.querySelector('input[name="name"]');
      const emailInput = form.querySelector('input[name="email"]');
      clearErrors(form);
      let isValid = true;
      if (!nameInput.value.trim()) {
        showError(nameInput, "Please enter your name.");
        isValid = false;
      }
      if (!emailInput.value.trim()) {
        showError(emailInput, "Please enter your email address.");
        isValid = false;
      } else if (!isValidEmail(emailInput.value.trim())) {
        showError(emailInput, "Enter a valid email (e.g., name@gmail.com, name@hotmail.com).");
        isValid = false;
      }
      if (isValid) {
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerText;
        submitBtn.classList.add('btn-loading');
        submitBtn.innerText = '';
        submitBtn.disabled = true;
        submitToGoogleSheets({ type: 'newsletter', name: nameInput.value.trim(), email: emailInput.value.trim() }, () => {
          submitBtn.classList.remove('btn-loading');
          submitBtn.innerText = originalText;
          submitBtn.disabled = false;
          showModal({ title: "Welcome to Inkoria Letters", message: "Monthly reflections on Kashmir Shaivism, new releases and early access.", buttons: [{ label: "Understood", action: "close", primary: true }] });
          form.reset();
        });
      }
    });
  }
  function attachWaitlistButtons() {
    document.querySelectorAll('.waitlist-btn').forEach(btn => {
      btn.removeEventListener('click', waitlistClickHandler);
      btn.addEventListener('click', waitlistClickHandler);
    });
  }
  function waitlistClickHandler(e) {
    const bookTitle = this.getAttribute('data-title');
    showModal({
      title: "Join the Waiting List",
      message: `Be notified when "${bookTitle}" becomes available.`,
      fields: [
        { type: "text", id: "waitlistName", placeholder: "Full name" },
        { type: "email", id: "waitlistEmail", placeholder: "Email address" }
      ],
      buttons: [
        { label: "Notify Me", action: "submitWaitlist", primary: true },
        { label: "Cancel", action: "close", primary: false }
      ],
      book: bookTitle
    });
  }
  init();
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal, .book-card, .upcoming-card, .stat-block').forEach(el => {
    el.classList.add('reveal');
    observer.observe(el);
  });
  function preventImageDrag() {
    document.querySelectorAll('img').forEach(img => {
      if (!img.hasAttribute('data-drag-protected')) {
        img.setAttribute('draggable', 'false');
        img.addEventListener('dragstart', (e) => e.preventDefault());
        img.setAttribute('data-drag-protected', 'true');
      }
    });
  }
  preventImageDrag();
  new MutationObserver(preventImageDrag).observe(document.body, { childList: true, subtree: true });
  document.addEventListener('contextmenu', (e) => {
    const tag = e.target.tagName.toLowerCase();
    if (tag !== 'input' && tag !== 'textarea' && tag !== 'button') e.preventDefault();
  });
</script>
</body>
</html>
